name: Deploy TDF Risk Analyzer

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source repo ref (branch/tag/SHA) to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: [self-hosted, gibsonlabs]

    steps:
      - name: Checkout source repo (johnmgibson3)
        uses: actions/checkout@v4
        with:
          repository: johnmgibson3/Agentic-Systems---Trojan-Debt-Fund
          ref: ${{ github.event.client_payload.ref || inputs.source_ref || 'main' }}
          path: app
          # If the source repo is private, add a repo-scoped PAT as SOURCE_REPO_TOKEN.
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Write .env from GitHub Secrets
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/app"

          cat > .env << 'EOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF

          # Optional secrets (safe if unset)
          if [ -n "${{ secrets.TDF_DECISION_MATRIX_PATH || '' }}" ]; then
            echo "TDF_DECISION_MATRIX_PATH=${{ secrets.TDF_DECISION_MATRIX_PATH }}" >> .env
          fi
          if [ -n "${{ secrets.TDF_SHARED_FILES_DIR || '' }}" ]; then
            echo "TDF_SHARED_FILES_DIR=${{ secrets.TDF_SHARED_FILES_DIR }}" >> .env
          fi
          if [ -n "${{ secrets.TDF_SHARED_EXTRACTED_TEXT_DIR || '' }}" ]; then
            echo "TDF_SHARED_EXTRACTED_TEXT_DIR=${{ secrets.TDF_SHARED_EXTRACTED_TEXT_DIR }}" >> .env
          fi

      - name: Build & deploy
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/app"

          docker compose down --remove-orphans
          docker compose up -d --force-recreate --remove-orphans --build
